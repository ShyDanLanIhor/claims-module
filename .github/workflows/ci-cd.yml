# CI/CD: build & test the backend, build the frontend, provision Azure infra (Bicep),
# run EF Core migrations, and deploy the API (App Service) and the Angular app (Static Web App).
#
# Required GitHub configuration:
#   Variables : AZURE_ENV_NAME, AZURE_LOCATION (e.g. westeurope)
#   Secrets   : AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC federated credential)
#               AZURE_SQL_ADMIN_PASSWORD
name: ci-cd

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore, build & test backend
        run: |
          dotnet restore ClaimsModule.sln
          dotnet build ClaimsModule.sln -c Release --no-restore
          dotnet test ClaimsModule.sln -c Release --no-build --verbosity normal

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/clients/web/package-lock.json

      - name: Build frontend
        working-directory: src/clients/web
        run: |
          npm ci
          npx ng build --configuration production

  deploy:
    name: Provision & deploy
    runs-on: ubuntu-latest
    needs: build
    # PR builds run tests only (the gate enforced by branch protection); the deploy runs only on a push to
    # main (i.e. after a green PR merge) or manual dispatch.
    if: github.event_name != 'pull_request'
    environment:
      name: production
      url: ${{ steps.provision.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision infrastructure (Bicep)
        id: provision
        run: |
          # ARM mangles the casing of deployment-output names (e.g. AZURE_RESOURCE_GROUP -> azurE_RESOURCE_GROUP),
          # so normalise every key to lowercase before reading — robust regardless of ARM's casing.
          # Deployment name keyed by run_id+attempt so reruns don't clash with a prior attempt's location.
          outputs=$(az deployment sub create \
            --name "claims-${{ github.run_id }}-${{ github.run_attempt }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --template-file iac/main.bicep \
            --parameters environmentName="${{ vars.AZURE_ENV_NAME }}" \
                         location="${{ vars.AZURE_LOCATION }}" \
                         sqlAdministratorPassword="${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            --query properties.outputs -o json | jq 'with_entries(.key |= ascii_downcase)')
          {
            echo "API_APP_NAME=$(echo "$outputs" | jq -r .api_app_service_name.value)"
            echo "API_BASE_URL=$(echo "$outputs" | jq -r .api_base_url.value)"
            echo "WEB_APP_NAME=$(echo "$outputs" | jq -r .web_static_web_app_name.value)"
            echo "RESOURCE_GROUP=$(echo "$outputs" | jq -r .azure_resource_group.value)"
            echo "SQL_FQDN=$(echo "$outputs" | jq -r .sql_server_fqdn.value)"
            echo "SQL_DB=$(echo "$outputs" | jq -r .sql_database_name.value)"
          } >> "$GITHUB_ENV"
          # Expose the user-facing URLs as step outputs for the GitHub environment link + the run summary.
          {
            echo "web_url=$(echo "$outputs" | jq -r .web_base_url.value)"
            echo "api_url=$(echo "$outputs" | jq -r .api_base_url.value)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef --version 9.*
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          export PATH="$HOME/.dotnet/tools:$PATH"
          runnerIp=$(curl -s https://api.ipify.org)
          az sql server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server "${SQL_FQDN%%.*}" \
            --name "github-runner-${{ github.run_id }}" \
            --start-ip-address "$runnerIp" --end-ip-address "$runnerIp"
          conn="Server=tcp:${SQL_FQDN},1433;Initial Catalog=${SQL_DB};User ID=claimsadmin;Password=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;Connection Timeout=60;"
          dotnet ef database update \
            --project src/infra/ClaimsModule.Persistence \
            --startup-project src/api/ClaimsModule.API \
            --connection "$conn"
          az sql server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server "${SQL_FQDN%%.*}" \
            --name "github-runner-${{ github.run_id }}" || true

      - name: Publish & deploy API (App Service)
        run: dotnet publish src/api/ClaimsModule.API -c Release -o ${{ runner.temp }}/api-publish

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          package: ${{ runner.temp }}/api-publish

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend against the deployed API
        working-directory: src/clients/web
        run: |
          cat > src/environments/environment.ts <<EOF
          export const environment = { production: true, apiBaseUrl: '${API_BASE_URL}/api' };
          EOF
          npm ci
          npx ng build --configuration production

      - name: Get Static Web App deployment token
        run: |
          token=$(az staticwebapp secrets list --name "$WEB_APP_NAME" --query "properties.apiKey" -o tsv)
          echo "::add-mask::$token"
          echo "SWA_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Deploy frontend (Static Web App)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          app_location: src/clients/web/dist/claims-module-web/browser
          skip_app_build: true

      - name: Deployment summary
        if: always() && steps.provision.outputs.web_url != ''
        run: |
          {
            echo "### ✅ Deployment"
            echo ""
            echo "| Service | URL |"
            echo "| --- | --- |"
            echo "| Frontend (Static Web App) | ${{ steps.provision.outputs.web_url }} |"
            echo "| API | ${{ steps.provision.outputs.api_url }} |"
            echo "| Swagger | ${{ steps.provision.outputs.api_url }}/swagger |"
            echo "| Health | ${{ steps.provision.outputs.api_url }}/health |"
          } >> "$GITHUB_STEP_SUMMARY"
